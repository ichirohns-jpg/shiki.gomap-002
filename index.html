<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>志木Go map オーナー</title>

  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1sZpmFFOJKDYKs6uLKHiwN07yzR3o65Cn&sz=w512">
  <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1sZpmFFOJKDYKs6uLKHiwN07yzR3o65Cn&sz=w512">

  <meta name="apple-mobile-web-app-title" content="志木Go map オーナー">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #fff5ef;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      width: 92%;
      max-width: 520px;
      text-align: center;
    }

    .icon {
      width: 180px;
      height: 180px;
      border-radius: 40px;
      object-fit: cover;
      display: block;
      margin: 0 auto 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      background: #fff0e6;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 22px 14px;
      border-radius: 999px;
      background: #e65100;
      color: #ffffff;
      font-size: 28px;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="box">
    <img
      class="icon"
      src="https://drive.google.com/thumbnail?id=1sZpmFFOJKDYKs6uLKHiwN07yzR3o65Cn&sz=w512"
      alt=""
    >

    <a
      class="btn"
      href="https://script.google.com/macros/s/AKfycbwjcfGsx0AQlZ77qV9McXQoJ0Cd9osRU9nyXXOmo9yqHp7_jtCAY6I5r7tu6FUYlPv2/exec"
    >
      投稿画面を開く
    </a>
  </div>
</body>
</html>
